title: TheProFile
description: Portfolio-as-Code — A Jekyll developer portfolio template. Fork, fill JSON, deploy.

url: "https://shaik-creator.github.io"
baseurl: "/my-portfolio"

markdown: kramdown
permalink: /blog/:title/

sass:
  sass_dir: _sass
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - AGENTS.md
  - CONTRIBUTING.md
  - PROJECT_RULES.md
  - SUPERPOWER-STYLE.md
  - CLAUDE.md
  - docs/
  - skills/
  - .agent/
  - .gemini/
  - adapters/