<!-- 
  badge_gen.html — Shields.io Badge URL Factory
  The centralized component for generating tech/social badges.
  Usage: {% raw %}{% include badge_gen.html label="React" color="61DAFB" logo="react" %}{% endraw %}
-->
<img
  src="https://img.shields.io/badge/{{ include.label | url_encode }}-{{ include.color | default: 'gray' }}?style=for-the-badge&logo={{ include.logo }}&logoColor=white"
  alt="{{ include.label }} Badge"
  loading="lazy"
  height="28"
  aria-label="{{ include.label }} achievement"
/>
