<!-- 
  TheProFile — Recommendations Section
  A grid of peer/manager testimonials.
  Data: site.data.profile.recommendations
-->
<section id="recommendations" class="recommendations section-wrapper" aria-label="Peer Recommendations">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">Recommendations</h2>
    </div>

    <!-- Recommendations Grid -->
    <div class="recommendations__grid">
      {% for rec in site.data.profile.recommendations %}
        <article class="rec-card" role="article">
          
          <!-- Testimonial Quote -->
          <blockquote class="rec-card__quote">
            <p>{{ rec.text }}</p>
          </blockquote>

          <!-- Author attribution -->
          <footer class="rec-card__footer">
            <cite class="rec-card__name">{{ rec.name }}</cite>
            
            {% if rec.title and rec.title != "" %}
              <span class="rec-card__title">{{ rec.title }}</span>
            {% endif %}
            
            {% if rec.linkedin_url and rec.linkedin_url != "" %}
              <a
                href="{{ rec.linkedin_url }}"
                class="rec-card__linkedin"
                target="_blank"
                rel="noopener noreferrer"
                title="View {{ rec.name }} on LinkedIn"
                aria-label="Visit {{ rec.name }}'s LinkedIn"
              >
                LinkedIn &rarr;
              </a>
            {% endif %}
          </footer>
        </article>
      {% endfor %}
    </div>
  </div>
</section>
