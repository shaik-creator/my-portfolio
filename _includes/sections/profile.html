<!-- 
  TheProFile — Profile Section
  Displays the developer's avatar and biography.
  Data: site.data.profile.bio, site.data.profile.profile_image_url
-->
<section id="profile" class="profile section-wrapper" aria-label="About Me">
  <div class="container profile__inner">
    
    <!-- Profile Avatar -->
    <div class="profile__image-wrap">
      <img
        src="{{ site.data.profile.profile_image_url | relative_url }}"
        alt="{{ site.data.profile.name }}"
        class="profile__image"
        width="280"
        height="280"
        loading="lazy"
      />
    </div>

    <!-- Biography Content -->
    <div class="profile__content">
      <h2 class="section-title">About Me</h2>
      <p class="profile__bio">{{ site.data.profile.bio }}</p>
    </div>
  </div>
</section>
