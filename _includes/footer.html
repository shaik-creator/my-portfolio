<!-- 
  TheProFile — Footer
  Minimalist footer with dynamic copyright year and back-to-top navigation.
-->
<footer class="footer" role="contentinfo">
  <div class="container footer__inner">
    <div class="footer__left">
      <p class="footer__copy">
        &copy; {{ "now" | date: "%Y" }} {{ site.data.profile.name }}. All rights reserved.
      </p>
      <p class="footer__credit">
        Built with <a href="https://github.com/SriSatyaLokesh/theprofile" target="_blank" rel="noopener">TheProFile</a>
        — Portfolio-as-Code.
      </p>
    </div>

    <!-- Back to Top Actions -->
    <div class="footer__right">
      <a href="#hero" class="footer__back-to-top" title="Back to Top" aria-label="Scroll back to top">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="20" height="20" aria-hidden="true">
          <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
      </a>
    </div>
  </div>
</footer>
